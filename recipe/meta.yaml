{% set name = "beniget" %}
{% set version = "0.4.2.post1" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: a0258537e65e7e14ec33a86802f865a667f949bb6c73646d55e42f7c45a052ae

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation  -vv
  noarch: python
requirements:
  host:
    - pip
    - python 3.9
    - setuptools
  run:
    - gast >=0.5.0
    - python >=3.9

test:
  imports:
    - beniget
  requires:
    - pip
  commands:
    - pip check

about:
  home: https://github.com/serge-sans-paille/beniget
  dev_url: https://github.com/serge-sans-paille/beniget
  doc_url: https://github.com/serge-sans-paille/beniget
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: Extract semantic information about static Python code
  description: |
    Beniget is a collection of Compile-time analyse on Python Abstract Syntax Tree(AST). 
    It's a building block to write static analyzer or compiler for Python.

extra:
  recipe-maintainers:
    - CyrilleBonamy
    - paugier
    - serge-sans-paille
